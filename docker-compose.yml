services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: stockmanager
      POSTGRES_USER: stockmanager
      POSTGRES_PASSWORD: stockmanager
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/stockmanager
      SPRING_DATASOURCE_USERNAME: stockmanager
      SPRING_DATASOURCE_PASSWORD: stockmanager
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db

volumes:
  db-data:
