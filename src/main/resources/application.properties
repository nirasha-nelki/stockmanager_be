spring.application.name=stockmanager_be

server.port=8080
spring.jpa.hibernate.ddl-auto=update

spring.jpa.generate-ddl=true
spring.jpa.show-sql=true

#spring.datasource.url=jdbc:mysql://localhost:3306/stockmanager?createDatabaseIfNotExist=true
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stockmanager}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:stockmanager}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:stockmanager}
#spring.datasource.username=root
#spring.datasource.password=iamroot1234

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
